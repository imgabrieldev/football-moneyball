apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: football-moneyball
data:
  init.sql: |
    CREATE EXTENSION IF NOT EXISTS vector;

    CREATE TABLE IF NOT EXISTS matches (
        match_id INTEGER PRIMARY KEY,
        competition VARCHAR(100),
        season VARCHAR(20),
        match_date DATE,
        home_team VARCHAR(100),
        away_team VARCHAR(100),
        home_score INTEGER,
        away_score INTEGER
    );

    CREATE TABLE IF NOT EXISTS player_match_metrics (
        match_id INTEGER REFERENCES matches(match_id),
        player_id INTEGER,
        player_name VARCHAR(100),
        team VARCHAR(100),
        minutes_played REAL,
        goals REAL, assists REAL, shots REAL, shots_on_target REAL, xg REAL, xa REAL,
        passes REAL, passes_completed REAL, pass_pct REAL,
        progressive_passes REAL, progressive_carries REAL,
        key_passes REAL, through_balls REAL, crosses REAL,
        tackles REAL, interceptions REAL, blocks REAL, clearances REAL,
        aerials_won REAL, aerials_lost REAL,
        fouls_committed REAL, fouls_won REAL,
        dribbles_attempted REAL, dribbles_completed REAL,
        touches REAL, carries REAL, dispossessed REAL,
        pressures REAL, pressure_regains REAL,
        progressive_receptions REAL, big_chances REAL, big_chances_missed REAL,
        passes_short REAL, passes_short_completed REAL,
        passes_medium REAL, passes_medium_completed REAL,
        passes_long REAL, passes_long_completed REAL,
        passes_under_pressure REAL, passes_under_pressure_completed REAL,
        switches_of_play REAL,
        ground_duels_won REAL, ground_duels_total REAL, tackle_success_rate REAL,
        xt_generated REAL, vaep_generated REAL, pressing_success_rate_individual REAL,
        PRIMARY KEY (match_id, player_id)
    );

    CREATE TABLE IF NOT EXISTS pass_networks (
        match_id INTEGER REFERENCES matches(match_id),
        passer_id INTEGER,
        receiver_id INTEGER,
        passer_name VARCHAR(100),
        receiver_name VARCHAR(100),
        weight INTEGER,
        features JSONB DEFAULT '{}',
        PRIMARY KEY (match_id, passer_id, receiver_id)
    );

    CREATE TABLE IF NOT EXISTS player_embeddings (
        player_id INTEGER,
        player_name VARCHAR(100),
        team VARCHAR(100),
        competition VARCHAR(100),
        season VARCHAR(20),
        embedding vector(16),
        cluster_label INTEGER,
        archetype VARCHAR(50),
        position_group VARCHAR(10),
        PRIMARY KEY (player_id, season)
    );

    CREATE INDEX IF NOT EXISTS idx_embeddings_hnsw ON player_embeddings
        USING hnsw (embedding vector_cosine_ops);

    CREATE TABLE IF NOT EXISTS stints (
        match_id INTEGER REFERENCES matches(match_id),
        stint_number INTEGER,
        home_player_ids INTEGER[],
        away_player_ids INTEGER[],
        duration_minutes REAL,
        home_xg REAL,
        away_xg REAL,
        xg_diff REAL,
        boundary_type VARCHAR(20),
        PRIMARY KEY (match_id, stint_number)
    );

    CREATE TABLE IF NOT EXISTS action_values (
        match_id INTEGER REFERENCES matches(match_id),
        event_index INTEGER,
        player_id INTEGER,
        player_name VARCHAR(100),
        team VARCHAR(100),
        action_type VARCHAR(50),
        start_x REAL, start_y REAL,
        end_x REAL, end_y REAL,
        xt_value REAL,
        vaep_value REAL,
        vaep_offensive REAL,
        vaep_defensive REAL,
        PRIMARY KEY (match_id, event_index)
    );

    CREATE TABLE IF NOT EXISTS pressing_metrics (
        match_id INTEGER REFERENCES matches(match_id),
        team VARCHAR(100),
        ppda REAL,
        pressing_success_rate REAL,
        counter_pressing_fraction REAL,
        high_turnovers INTEGER,
        shot_ending_high_turnovers INTEGER,
        pressing_zone_1 REAL, pressing_zone_2 REAL, pressing_zone_3 REAL,
        pressing_zone_4 REAL, pressing_zone_5 REAL, pressing_zone_6 REAL,
        PRIMARY KEY (match_id, team)
    );

    CREATE TABLE IF NOT EXISTS match_odds (
        match_id INTEGER REFERENCES matches(match_id),
        bookmaker VARCHAR(100),
        market VARCHAR(50),
        outcome VARCHAR(50),
        point REAL DEFAULT 0.0,
        odds REAL,
        implied_prob REAL,
        fetched_at VARCHAR(50),
        PRIMARY KEY (match_id, bookmaker, market, outcome, point)
    );

    CREATE TABLE IF NOT EXISTS match_predictions (
        match_id INTEGER PRIMARY KEY REFERENCES matches(match_id),
        home_team VARCHAR(100),
        away_team VARCHAR(100),
        home_xg_expected REAL,
        away_xg_expected REAL,
        home_win_prob REAL,
        draw_prob REAL,
        away_win_prob REAL,
        over_25_prob REAL,
        btts_prob REAL,
        most_likely_score VARCHAR(10),
        simulations INTEGER,
        predicted_at VARCHAR(50),
        commence_time VARCHAR(50),
        lineup_type VARCHAR(30),
        model_version VARCHAR(20),
        multi_markets JSONB,
        player_props JSONB
    );

    CREATE TABLE IF NOT EXISTS value_bets (
        id SERIAL PRIMARY KEY,
        match_id INTEGER REFERENCES matches(match_id),
        market VARCHAR(50),
        outcome VARCHAR(50),
        model_prob REAL,
        best_odds REAL,
        bookmaker VARCHAR(100),
        implied_prob REAL,
        edge REAL,
        kelly_fraction REAL,
        recommended_stake REAL,
        actual_result VARCHAR(50),
        profit REAL,
        created_at VARCHAR(50)
    );

    CREATE TABLE IF NOT EXISTS backtest_results (
        id SERIAL PRIMARY KEY,
        run_date VARCHAR(50),
        matches_analyzed INTEGER,
        bets_placed INTEGER,
        total_staked REAL,
        total_return REAL,
        roi REAL,
        hit_rate REAL,
        brier_score REAL,
        max_drawdown REAL,
        config JSONB DEFAULT '{}'
    );

    CREATE TABLE IF NOT EXISTS match_stats (
        match_id INTEGER PRIMARY KEY REFERENCES matches(match_id),
        home_corners INTEGER, away_corners INTEGER,
        home_yellow INTEGER, away_yellow INTEGER,
        home_red INTEGER, away_red INTEGER,
        home_fouls INTEGER, away_fouls INTEGER,
        home_shots INTEGER, away_shots INTEGER,
        home_sot INTEGER, away_sot INTEGER,
        home_saves INTEGER, away_saves INTEGER,
        home_possession REAL, away_possession REAL,
        ht_home_score INTEGER, ht_away_score INTEGER,
        referee_id INTEGER,
        referee_name VARCHAR(100)
    );

    CREATE TABLE IF NOT EXISTS referee_stats (
        referee_id INTEGER PRIMARY KEY,
        name VARCHAR(100),
        matches INTEGER,
        yellow_total INTEGER,
        red_total INTEGER,
        yellowred_total INTEGER,
        cards_per_game REAL,
        last_updated VARCHAR(50)
    );

    CREATE TABLE IF NOT EXISTS team_coaches (
        team VARCHAR(100),
        coach_id INTEGER,
        start_match_date VARCHAR(20),
        coach_name VARCHAR(100),
        end_match_date VARCHAR(20),
        games_coached INTEGER,
        wins INTEGER, draws INTEGER, losses INTEGER,
        source VARCHAR(20),
        PRIMARY KEY (team, coach_id, start_match_date)
    );

    CREATE TABLE IF NOT EXISTS player_injuries (
        match_id INTEGER,
        player_id INTEGER,
        player_name VARCHAR(100),
        team VARCHAR(100),
        reason_code INTEGER,
        reason_label VARCHAR(50),
        fetched_at VARCHAR(50),
        PRIMARY KEY (match_id, player_id)
    );

    CREATE TABLE IF NOT EXISTS league_standings (
        competition VARCHAR(100),
        season VARCHAR(20),
        team VARCHAR(100),
        snapshot_date VARCHAR(20),
        position INTEGER,
        points INTEGER,
        played INTEGER,
        wins INTEGER, draws INTEGER, losses INTEGER,
        goals_for INTEGER, goals_against INTEGER,
        PRIMARY KEY (competition, season, team, snapshot_date)
    );

    CREATE INDEX IF NOT EXISTS idx_injuries_team ON player_injuries(team);
    CREATE INDEX IF NOT EXISTS idx_standings_date ON league_standings(snapshot_date);
    CREATE INDEX IF NOT EXISTS idx_coaches_team ON team_coaches(team);

    CREATE TABLE IF NOT EXISTS match_lineups (
        match_key INTEGER,
        player_id INTEGER,
        team VARCHAR(100),
        side VARCHAR(10),
        player_name VARCHAR(100),
        position VARCHAR(5),
        is_starter INTEGER,
        jersey_number INTEGER,
        source VARCHAR(20),
        fetched_at VARCHAR(50),
        PRIMARY KEY (match_key, player_id)
    );

    CREATE INDEX IF NOT EXISTS idx_value_bets_match ON value_bets(match_id);
    CREATE INDEX IF NOT EXISTS idx_match_odds_match ON match_odds(match_id);

    CREATE INDEX IF NOT EXISTS idx_action_values_player ON action_values(player_id);

    CREATE INDEX IF NOT EXISTS idx_match_lineups_team ON match_lineups(team);
