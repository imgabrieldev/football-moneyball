apiVersion: batch/v1
kind: CronJob
metadata:
  name: snapshot-odds
  namespace: football-moneyball
spec:
  schedule: "0 8 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: odds
              image: moneyball:0.6.0
              command: ["moneyball", "snapshot-odds"]
              env:
                - name: DATABASE_URL
                  value: "postgresql://moneyball:moneyball@postgres:5432/moneyball"
              envFrom:
                - configMapRef:
                    name: moneyball-config
          restartPolicy: OnFailure
